<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: url('YOUR_IMAGE_HERE.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Glass container */
.container {
    position: relative;
    z-index: 1;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    color: white;
    width: 320px;
}

/* Timer text */
#time {
    font-size: 3rem;
    margin: 20px 0;
}

/* Buttons */
.buttons button {
    margin: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.buttons button:hover {
    background: rgba(255,255,255,0.4);
}

/* Mode buttons */
.modes button {
    margin: 5px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
}

.active {
    background: #ff4c4c !important;
}

/* Circle progress */
svg {
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 8;
    stroke: rgba(255,255,255,0.2);
}

.progress {
    stroke: #ff4c4c;
    stroke-dasharray: 565;
    stroke-dashoffset: 565;
    transition: stroke-dashoffset 1s linear;
}
</style>
</head>

<body>

<div class="container">
    <h2>🍅 Pomodoro</h2>

    <svg width="200" height="200">
        <circle cx="100" cy="100" r="90"></circle>
        <circle cx="100" cy="100" r="90" class="progress"></circle>
    </svg>

    <div id="time">25:00</div>

    <div class="modes">
        <button onclick="setMode(25)" class="active">Focus</button>
        <button onclick="setMode(5)">Short</button>
        <button onclick="setMode(15)">Long</button>
    </div>

    <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
</div>

<script>
let time = 1500;
let interval = null;
let totalTime = time;

const timeDisplay = document.getElementById("time");
const progress = document.querySelector(".progress");

function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timeDisplay.textContent =
        `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

    let progressValue = 565 - (565 * time / totalTime);
    progress.style.strokeDashoffset = progressValue;
}

function startTimer() {
    if (interval) return;

    interval = setInterval(() => {
        if (time > 0) {
            time--;
            updateDisplay();
        } else {
            clearInterval(interval);
            interval = null;
            alert("Time's up!");
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {
    pauseTimer();
    time = totalTime;
    updateDisplay();
}

function setMode(minutes) {
    document.querySelectorAll(".modes button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    pauseTimer();
    time = minutes * 60;
    totalTime = time;
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
